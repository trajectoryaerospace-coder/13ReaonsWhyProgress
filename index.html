<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13 Reasons Why • Live Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAa3rl2MqU4U5bXfUjgNTy31uZ_vqnqFTo",
      authDomain: "reasons-ae457.firebaseapp.com",
      projectId: "reasons-ae457",
      storageBucket: "reasons-ae457.firebasestorage.app",
      messagingSenderId: "677542013885",
      appId: "1:677542013885:web:03784914e97d7796abc0d4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Season lengths (episodes)
    const seasonLengths = [13, 13, 13, 10];

    // Accurate episode lengths in minutes (as provided)
    const episodeLengths = {
      1: [54,52,57,57,59,52,54,54,59,50,54,62,58],
      2: [60,60,57,57,57,57,56,57,57,55,58,56,70],
      3: [56,57,60,58,59,57,49,51,55,53,54,59,72],
      4: [59,57,59,58,56,61,59,57,59,98]
    };

    function getEpisodeLength(season, episode) {
      return episodeLengths[season]?.[episode - 1] || 55;
    }

    function calculateProgress(season, episode) {
      let completed = 0;
      for (let i = 0; i < season - 1; i++) {
        completed += seasonLengths[i];
      }
      completed += Math.max(0, episode);
      const totalEpisodes = 49;
      return Math.min(100, Math.round((completed / totalEpisodes) * 100));
    }

    function calculateWatchTime(season, episode, minutes = 0) {
      let totalMinutes = minutes;
      for (let s = 1; s < season; s++) {
        for (let e = 1; e <= seasonLengths[s-1]; e++) {
          totalMinutes += getEpisodeLength(s, e);
        }
      }
      for (let e = 1; e < episode; e++) {
        totalMinutes += getEpisodeLength(season, e);
      }
      const hours = Math.floor(totalMinutes / 60);
      const mins = totalMinutes % 60;
      return `${hours}h ${mins}m`;
    }

    function episodeToString(season, episode) {
      return `S${season} E${episode}`;
    }

    let zanieke = { season: 1, episode: 1, minutes: 0 };
    let ayushman = { season: 1, episode: 1, minutes: 0 };

    function initFirebase() {
      onValue(ref(db, 'zanieke'), (snapshot) => {
        const data = snapshot.val() || { season: 1, episode: 1, minutes: 0 };
        zanieke = data;
        updateUI('zanieke');
      });

      onValue(ref(db, 'ayushman'), (snapshot) => {
        const data = snapshot.val() || { season: 1, episode: 1, minutes: 0 };
        ayushman = data;
        updateUI('ayushman');
      });
    }

    function updateUI(person) {
      const data = person === 'zanieke' ? zanieke : ayushman;
      const prefix = person;
      const epLength = getEpisodeLength(data.season, data.episode);

      document.getElementById(`${prefix}-status`).textContent = episodeToString(data.season, data.episode);
      
      // Overall progress
      const progress = calculateProgress(data.season, data.episode);
      document.getElementById(`${prefix}-progress`).style.width = `${progress}%`;
      document.getElementById(`${prefix}-percent`).textContent = `${progress}%`;

      // Current episode time & bar
      document.getElementById(`${prefix}-current-time`).textContent = `${data.minutes} / ${epLength} min`;
      const epProgressPercent = Math.min(100, Math.round((data.minutes / epLength) * 100));
      document.getElementById(`${prefix}-ep-progress`).style.width = `${epProgressPercent}%`;

      // Total watch time
      document.getElementById(`${prefix}-time`).textContent = calculateWatchTime(data.season, data.episode, data.minutes);
    }

    function saveProgress(person) {
      const data = person === 'zanieke' ? zanieke : ayushman;
      set(ref(db, person), data);
    }

    function changeEpisode(person, delta) {
      const data = person === 'zanieke' ? zanieke : ayushman;
      let { season, episode } = data;

      episode += delta;
      if (episode > seasonLengths[season - 1]) {
        if (season < 4) {
          season++;
          episode = 1;
        } else {
          episode = seasonLengths[3];
        }
      } else if (episode < 1) {
        if (season > 1) {
          season--;
          episode = seasonLengths[season - 1];
        } else {
          episode = 1;
        }
      }
      data.season = season;
      data.episode = episode;
      data.minutes = 0;

      updateUI(person);
      saveProgress(person);
    }

    function changeSeason(person, delta) {
      const data = person === 'zanieke' ? zanieke : ayushman;
      data.season = Math.max(1, Math.min(4, data.season + delta));
      data.episode = Math.min(data.episode, seasonLengths[data.season - 1]);
      data.minutes = 0;
      updateUI(person);
      saveProgress(person);
    }

    function adjustMinutes(person, delta) {
      const data = person === 'zanieke' ? zanieke : ayushman;
      const epLength = getEpisodeLength(data.season, data.episode);
      
      data.minutes = Math.max(0, Math.min(epLength, data.minutes + delta));

      if (data.minutes >= epLength) {
        changeEpisode(person, 1);
        return;
      }

      updateUI(person);
      saveProgress(person);
    }

    window.changeEpisode = changeEpisode;
    window.changeSeason = changeSeason;
    window.adjustMinutes = adjustMinutes;

    window.onload = () => {
      initFirebase();
    };
  </script>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-12">
  <div class="max-w-4xl mx-auto p-4 sm:p-6">
    <h1 class="text-4xl sm:text-5xl font-bold text-center mb-1">13 Reasons Why</h1>
    <p class="text-center text-zinc-400 mb-8 sm:mb-10 text-sm sm:text-base">Live Progress Tracker • Real-time Sync</p>

    <!-- Zanieke -->
    <div class="mb-10 sm:mb-12 bg-zinc-900 rounded-3xl p-5 sm:p-8">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6 gap-3">
        <div>
          <h2 class="text-3xl font-semibold">Zanieke</h2>
          <p id="zanieke-status" class="text-2xl text-emerald-400 font-mono">S1 E1</p>
        </div>
        <div class="flex gap-2">
          <button onclick="changeSeason('zanieke', -1)" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-2xl text-sm">← Season</button>
          <button onclick="changeSeason('zanieke', 1)" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-2xl text-sm">Season →</button>
        </div>
      </div>

      <!-- Overall Progress -->
      <div class="h-5 sm:h-6 bg-zinc-800 rounded-2xl overflow-hidden mb-3">
        <div id="zanieke-progress" class="h-full bg-gradient-to-r from-emerald-400 to-cyan-400 w-0 transition-all duration-500"></div>
      </div>
      <div class="flex justify-between text-xs sm:text-sm text-zinc-400 mb-6">
        <span>0%</span>
        <span id="zanieke-percent">0%</span>
        <span>100%</span>
      </div>

      <!-- Current Episode -->
      <div class="mb-6">
        <div class="flex justify-between text-sm mb-2">
          <span class="text-zinc-400">Current Episode</span>
          <span id="zanieke-current-time" class="font-mono text-emerald-400">0 / 54 min</span>
        </div>
        <div class="h-3 bg-zinc-800 rounded-full overflow-hidden">
          <div id="zanieke-ep-progress" class="h-full bg-emerald-400 w-0 transition-all"></div>
        </div>
      </div>

      <div class="flex items-center justify-between bg-zinc-950 rounded-2xl p-4 mb-6 text-sm">
        <div class="text-zinc-400">Total Watch Time</div>
        <div id="zanieke-time" class="font-mono text-emerald-400 text-lg font-medium">0h 0m</div>
      </div>

      <!-- Buttons -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <button onclick="changeEpisode('zanieke', -1)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-base font-medium">← Prev</button>
        <button onclick="changeEpisode('zanieke', 1)" class="bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl text-base font-medium">Next →</button>
        <button onclick="adjustMinutes('zanieke', -5)" class="bg-zinc-700 hover:bg-zinc-600 py-3 rounded-2xl text-sm">-5 min</button>
        <button onclick="adjustMinutes('zanieke', 5)" class="bg-emerald-600 hover:bg-emerald-500 py-3 rounded-2xl text-sm">+5 min</button>
        <button onclick="adjustMinutes('zanieke', -1)" class="bg-zinc-700 hover:bg-zinc-600 py-3 rounded-2xl text-sm">-1 min</button>
        <button onclick="adjustMinutes('zanieke', 1)" class="bg-emerald-600 hover:bg-emerald-500 py-3 rounded-2xl text-sm">+1 min</button>
      </div>
    </div>

    <!-- Ayushman -->
    <div class="bg-zinc-900 rounded-3xl p-5 sm:p-8">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6 gap-3">
        <div>
          <h2 class="text-3xl font-semibold">Ayushman</h2>
          <p id="ayushman-status" class="text-2xl text-violet-400 font-mono">S1 E1</p>
        </div>
        <div class="flex gap-2">
          <button onclick="changeSeason('ayushman', -1)" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-2xl text-sm">← Season</button>
          <button onclick="changeSeason('ayushman', 1)" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-2xl text-sm">Season →</button>
        </div>
      </div>

      <!-- Overall Progress -->
      <div class="h-5 sm:h-6 bg-zinc-800 rounded-2xl overflow-hidden mb-3">
        <div id="ayushman-progress" class="h-full bg-gradient-to-r from-violet-400 to-fuchsia-400 w-0 transition-all duration-500"></div>
      </div>
      <div class="flex justify-between text-xs sm:text-sm text-zinc-400 mb-6">
        <span>0%</span>
        <span id="ayushman-percent">0%</span>
        <span>100%</span>
      </div>

      <!-- Current Episode -->
      <div class="mb-6">
        <div class="flex justify-between text-sm mb-2">
          <span class="text-zinc-400">Current Episode</span>
          <span id="ayushman-current-time" class="font-mono text-violet-400">0 / 54 min</span>
        </div>
        <div class="h-3 bg-zinc-800 rounded-full overflow-hidden">
          <div id="ayushman-ep-progress" class="h-full bg-violet-400 w-0 transition-all"></div>
        </div>
      </div>

      <div class="flex items-center justify-between bg-zinc-950 rounded-2xl p-4 mb-6 text-sm">
        <div class="text-zinc-400">Total Watch Time</div>
        <div id="ayushman-time" class="font-mono text-violet-400 text-lg font-medium">0h 0m</div>
      </div>

      <!-- Buttons -->
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <button onclick="changeEpisode('ayushman', -1)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-base font-medium">← Prev</button>
        <button onclick="changeEpisode('ayushman', 1)" class="bg-violet-600 hover:bg-violet-500 py-4 rounded-2xl text-base font-medium">Next →</button>
        <button onclick="adjustMinutes('ayushman', -5)" class="bg-zinc-700 hover:bg-zinc-600 py-3 rounded-2xl text-sm">-5 min</button>
        <button onclick="adjustMinutes('ayushman', 5)" class="bg-violet-600 hover:bg-violet-500 py-3 rounded-2xl text-sm">+5 min</button>
        <button onclick="adjustMinutes('ayushman', -1)" class="bg-zinc-700 hover:bg-zinc-600 py-3 rounded-2xl text-sm">-1 min</button>
        <button onclick="adjustMinutes('ayushman', 1)" class="bg-violet-600 hover:bg-violet-500 py-3 rounded-2xl text-sm">+1 min</button>
      </div>
    </div>

    <div class="text-center text-xs text-zinc-500 mt-10">
      Real-time sync • Accurate episode lengths • Powered by Firebase
    </div>
  </div>
</body>
</html>
