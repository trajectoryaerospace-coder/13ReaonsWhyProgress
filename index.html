<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shared Progress Tracker</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f0f1a;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px;
        gap: 20px;
    }

    .card, .slider-section {
        background: #1b1b2a;
        padding: 18px;
        border-radius: 12px;
        width: 320px;
        text-align: center;
    }

    .slider-title {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-weight: bold;
    }

    input[type="range"] {
        width: 100%;
    }

    .progress-value {
        color: #00ffcc;
    }

    .footer-note {
        opacity: 0.7;
        font-size: 13px;
    }
</style>
</head>

<body>

<div class="card">
    <h2>❤️ Zanieke</h2>
    <div id="info1">0 / 49 episodes</div>
</div>

<div class="card">
    <h2>💙 Ayushman</h2>
    <div id="info2">0 / 49 episodes</div>
</div>

<div class="slider-section">
    <div class="slider-title">
        <span>❤️ Zanieke</span>
        <span id="percent1" class="progress-value">0%</span>
    </div>
    <input type="range" id="slider1" min="0" max="49" value="0">
</div>

<div class="slider-section">
    <div class="slider-title">
        <span>💙 Ayushman</span>
        <span id="percent2" class="progress-value">0%</span>
    </div>
    <input type="range" id="slider2" min="0" max="49" value="0">
</div>

<div class="footer-note">
    49 Episodes Total • Live Firebase Sync
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update } 
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

/* 🔥 YOUR CONFIG (FIXED) */
const firebaseConfig = {
    apiKey: "AIzaSyAa3rl2MqU4U5bXfUjgNTy31uZ_vqnqFTo",
    authDomain: "reasons-ae457.firebaseapp.com",
    databaseURL: "https://reasons-ae457-default-rtdb.firebaseio.com",
    projectId: "reasons-ae457",
    storageBucket: "reasons-ae457.firebasestorage.app",
    messagingSenderId: "677542013885",
    appId: "1:677542013885:web:03784914e97d7796abc0d4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db, "progress");

/* UI */
const slider1 = document.getElementById("slider1");
const slider2 = document.getElementById("slider2");

const percent1 = document.getElementById("percent1");
const percent2 = document.getElementById("percent2");

const info1 = document.getElementById("info1");
const info2 = document.getElementById("info2");

const TOTAL = 49;

/* 🔴 REALTIME LISTENER */
onValue(dataRef, (snapshot) => {
    const data = snapshot.val();

    if (!data) return;

    slider1.value = data.z ?? 0;
    slider2.value = data.a ?? 0;

    updateUI(data.z ?? 0, data.a ?? 0);
});

/* 🔴 WRITE (IMPORTANT FIX: ALWAYS WRITE BOTH VALUES) */
function push() {
    update(dataRef, {
        z: parseInt(slider1.value),
        a: parseInt(slider2.value)
    });
}

slider1.addEventListener("input", push);
slider2.addEventListener("input", push);

/* UI */
function updateUI(z, a) {
    percent1.textContent = Math.round((z / TOTAL) * 100) + "%";
    percent2.textContent = Math.round((a / TOTAL) * 100) + "%";

    info1.textContent = `${z} / ${TOTAL} episodes`;
    info2.textContent = `${a} / ${TOTAL} episodes`;
}

/* INIT (ONLY IF EMPTY) */
set(dataRef, {
    z: 0,
    a: 0
});
</script>

</body>
</html>
