<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13 Reasons Why • Live Progress</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAa3rl2MqU4U5bXfUjgNTy31uZ_vqnqFTo",
      authDomain: "reasons-ae457.firebaseapp.com",
      projectId: "reasons-ae457",
      storageBucket: "reasons-ae457.firebasestorage.app",
      messagingSenderId: "677542013885",
      appId: "1:677542013885:web:03784914e97d7796abc0d4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Episode counts per season
    const seasonLengths = [13, 13, 13, 10];

    // Approximate episode lengths in minutes (based on real data: most ~50-60 min, some longer)
    // You can edit these values if you know exact times
    const episodeLengths = {
      1: Array(13).fill(55), // Season 1
      2: Array(13).fill(58), // Season 2 (slightly longer on average)
      3: Array(13).fill(60), // Season 3
      4: Array(10).fill(62)  // Season 4 (finale episodes longer)
    };

    function getEpisodeLength(season, episode) {
      return episodeLengths[season][episode - 1] || 55;
    }

    function calculateOverallProgress(season, episode, minutes) {
      let completedEpisodes = 0;
      for (let s = 1; s < season; s++) {
        completedEpisodes += seasonLengths[s - 1];
      }
      completedEpisodes += (episode - 1);
      const totalEpisodes = 49;
      const progressFromEpisodes = (completedEpisodes / totalEpisodes) * 100;
      const currentEpisodeProgress = (minutes / getEpisodeLength(season, episode)) * 100 / totalEpisodes;
      return Math.min(100, Math.round(progressFromEpisodes + currentEpisodeProgress));
    }

    function calculateTotalWatchTime(season, episode, minutes) {
      let totalMinutes = minutes;
      for (let s = 1; s < season; s++) {
        for (let e = 1; e <= seasonLengths[s - 1]; e++) {
          totalMinutes += getEpisodeLength(s, e);
        }
      }
      for (let e = 1; e < episode; e++) {
        totalMinutes += getEpisodeLength(season, e);
      }
      const hours = Math.floor(totalMinutes / 60);
      const mins = totalMinutes % 60;
      return `${hours}h ${mins}m`;
    }

    function episodeToString(season, episode) {
      return `S${season} E${episode}`;
    }

    let zanieke = { season: 1, episode: 1, minutes: 0 };
    let ayushman = { season: 1, episode: 1, minutes: 0 };

    function initFirebase() {
      onValue(ref(db, 'zanieke'), (snapshot) => {
        const data = snapshot.val() || { season: 1, episode: 1, minutes: 0 };
        zanieke = data;
        updateUI('zanieke');
      });

      onValue(ref(db, 'ayushman'), (snapshot) => {
        const data = snapshot.val() || { season: 1, episode: 1, minutes: 0 };
        ayushman = data;
        updateUI('ayushman');
      });
    }

    function updateUI(person) {
      const data = person === 'zanieke' ? zanieke : ayushman;
      const prefix = person;

      document.getElementById(`${prefix}-status`).textContent = episodeToString(data.season, data.episode);
      document.getElementById(`${prefix}-time`).textContent = `${data.minutes} / ${getEpisodeLength(data.season, data.episode)} min`;

      // Current episode progress bar
      const epProgress = Math.min(100, Math.round((data.minutes / getEpisodeLength(data.season, data.episode)) * 100));
      document.getElementById(`${prefix}-ep-progress`).style.width = `${epProgress}%`;

      // Overall series progress
      const overall = calculateOverallProgress(data.season, data.episode, data.minutes);
      document.getElementById(`${prefix}-overall-progress`).style.width = `${overall}%`;
      document.getElementById(`${prefix}-overall-percent`).textContent = `${overall}%`;

      // Total watch time
      document.getElementById(`${prefix}-total-time`).textContent = calculateTotalWatchTime(data.season, data.episode, data.minutes);
    }

    function saveProgress(person) {
      set(ref(db, person), person === 'zanieke' ? zanieke : ayushman);
    }

    function updateEpisodeProgress(person, newMinutes) {
      const data = person === 'zanieke' ? zanieke : ayushman;
      const epLength = getEpisodeLength(data.season, data.episode);

      if (newMinutes >= epLength) {
        // Move to next episode
        if (data.episode < seasonLengths[data.season - 1]) {
          data.episode++;
          data.minutes = 0;
        } else if (data.season < 4) {
          data.season++;
          data.episode = 1;
          data.minutes = 0;
        } else {
          data.minutes = epLength;
        }
      } else if (newMinutes < 0) {
        // Go to previous episode
        if (data.episode > 1) {
          data.episode--;
          data.minutes = getEpisodeLength(data.season, data.episode);
        } else if (data.season > 1) {
          data.season--;
          data.episode = seasonLengths[data.season - 1];
          data.minutes = getEpisodeLength(data.season, data.episode);
        } else {
          data.minutes = 0;
        }
      } else {
        data.minutes = Math.max(0, Math.min(epLength, newMinutes));
      }

      updateUI(person);
      saveProgress(person);
    }

    function changeSeason(person, delta) {
      const data = person === 'zanieke' ? zanieke : ayushman;
      data.season = Math.max(1, Math.min(4, data.season + delta));
      data.episode = Math.min(data.episode, seasonLengths[data.season - 1]);
      data.minutes = 0;
      updateUI(person);
      saveProgress(person);
    }

    // Make global
    window.updateEpisodeProgress = updateEpisodeProgress;
    window.changeSeason = changeSeason;

    window.onload = () => {
      initFirebase();
    };
  </script>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-12">
  <div class="max-w-4xl mx-auto p-4 sm:p-6">
    <h1 class="text-4xl sm:text-5xl font-bold text-center mb-1">13 Reasons Why</h1>
    <p class="text-center text-zinc-400 mb-8 sm:mb-10">Live Progress Tracker • Real-time Sync</p>

    <!-- Zanieke -->
    <div class="mb-10 sm:mb-12 bg-zinc-900 rounded-3xl p-5 sm:p-8">
      <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between mb-6 gap-4">
        <div>
          <h2 class="text-3xl font-semibold">Zanieke</h2>
          <p id="zanieke-status" class="text-2xl text-emerald-400 font-mono">S1 E1</p>
        </div>
        <div class="flex gap-2">
          <button onclick="changeSeason('zanieke', -1)" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-2xl text-sm">← Season</button>
          <button onclick="changeSeason('zanieke', 1)" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-2xl text-sm">Season →</button>
        </div>
      </div>

      <!-- Current Episode Progress -->
      <div class="mb-6">
        <div class="flex justify-between text-sm mb-2">
          <span class="text-zinc-400">Current Episode</span>
          <span id="zanieke-time" class="font-mono text-emerald-400">0 / 55 min</span>
        </div>
        <div class="h-3 bg-zinc-800 rounded-full overflow-hidden">
          <div id="zanieke-ep-progress" class="h-full bg-emerald-400 w-0 transition-all"></div>
        </div>
      </div>

      <!-- Overall Progress -->
      <div>
        <div class="flex justify-between text-xs text-zinc-400 mb-1">
          <span>Overall Series</span>
          <span id="zanieke-overall-percent">0%</span>
        </div>
        <div class="h-2.5 bg-zinc-800 rounded-full overflow-hidden mb-4">
          <div id="zanieke-overall-progress" class="h-full bg-gradient-to-r from-emerald-400 to-cyan-400 w-0 transition-all"></div>
        </div>
      </div>

      <div class="bg-zinc-950 rounded-2xl p-4 mb-6 flex justify-between items-center">
        <span class="text-zinc-400">Total Watch Time</span>
        <span id="zanieke-total-time" class="font-mono text-lg text-emerald-400">0h 0m</span>
      </div>

      <div class="grid grid-cols-3 gap-3">
        <button onclick="updateEpisodeProgress('zanieke', zanieke.minutes - 5)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm">-5 min</button>
        <button onclick="updateEpisodeProgress('zanieke', zanieke.minutes - 1)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm">-1 min</button>
        <button onclick="updateEpisodeProgress('zanieke', zanieke.minutes + 1)" class="bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl text-sm">+1 min</button>
        <button onclick="updateEpisodeProgress('zanieke', zanieke.minutes + 5)" class="bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl text-sm col-span-2">+5 min (or Next)</button>
        <button onclick="updateEpisodeProgress('zanieke', 999)" class="bg-emerald-700 hover:bg-emerald-600 py-4 rounded-2xl text-sm">Finish Episode</button>
      </div>
    </div>

    <!-- Ayushman (same structure) -->
    <div class="bg-zinc-900 rounded-3xl p-5 sm:p-8">
      <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between mb-6 gap-4">
        <div>
          <h2 class="text-3xl font-semibold">Ayushman</h2>
          <p id="ayushman-status" class="text-2xl text-violet-400 font-mono">S1 E1</p>
        </div>
        <div class="flex gap-2">
          <button onclick="changeSeason('ayushman', -1)" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-2xl text-sm">← Season</button>
          <button onclick="changeSeason('ayushman', 1)" class="bg-zinc-800 hover:bg-zinc-700 px-5 py-2.5 rounded-2xl text-sm">Season →</button>
        </div>
      </div>

      <div class="mb-6">
        <div class="flex justify-between text-sm mb-2">
          <span class="text-zinc-400">Current Episode</span>
          <span id="ayushman-time" class="font-mono text-violet-400">0 / 55 min</span>
        </div>
        <div class="h-3 bg-zinc-800 rounded-full overflow-hidden">
          <div id="ayushman-ep-progress" class="h-full bg-violet-400 w-0 transition-all"></div>
        </div>
      </div>

      <div>
        <div class="flex justify-between text-xs text-zinc-400 mb-1">
          <span>Overall Series</span>
          <span id="ayushman-overall-percent">0%</span>
        </div>
        <div class="h-2.5 bg-zinc-800 rounded-full overflow-hidden mb-4">
          <div id="ayushman-overall-progress" class="h-full bg-gradient-to-r from-violet-400 to-fuchsia-400 w-0 transition-all"></div>
        </div>
      </div>

      <div class="bg-zinc-950 rounded-2xl p-4 mb-6 flex justify-between items-center">
        <span class="text-zinc-400">Total Watch Time</span>
        <span id="ayushman-total-time" class="font-mono text-lg text-violet-400">0h 0m</span>
      </div>

      <div class="grid grid-cols-3 gap-3">
        <button onclick="updateEpisodeProgress('ayushman', ayushman.minutes - 5)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm">-5 min</button>
        <button onclick="updateEpisodeProgress('ayushman', ayushman.minutes - 1)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm">-1 min</button>
        <button onclick="updateEpisodeProgress('ayushman', ayushman.minutes + 1)" class="bg-violet-600 hover:bg-violet-500 py-4 rounded-2xl text-sm">+1 min</button>
        <button onclick="updateEpisodeProgress('ayushman', ayushman.minutes + 5)" class="bg-violet-600 hover:bg-violet-500 py-4 rounded-2xl text-sm col-span-2">+5 min (or Next)</button>
        <button onclick="updateEpisodeProgress('ayushman', 999)" class="bg-violet-700 hover:bg-violet-600 py-4 rounded-2xl text-sm">Finish Episode</button>
      </div>
    </div>

    <div class="text-center text-xs text-zinc-500 mt-10">
      Real-time sync • Per-minute episode progress • Powered by Firebase
    </div>
  </div>
</body>
</html>
